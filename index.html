<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détective Game</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0B0F1A;
            color: white;
            overflow: hidden;
        }

        .header {
            padding: 15px;
            background: #111827;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .scene {
            position: relative;
            width: 100vw;
            height: calc(100vh - 120px); /* Ajuste selon la taille du header/footer */
            display: flex;
            justify-content: center;
            background: black;
        }

        .scene img {
            height: 100%;
            width: auto;
            display: block;
        }

        /* Conteneur pour que les zones restent alignées sur l'image */
        .image-container {
            position: relative;
            height: 100%;
        }

        .zone {
            position: absolute;
            /* border: 2px solid red;  <-- Décommente pour voir les zones pendant tes tests */
            cursor: pointer;
            z-index: 10;
        }

        .inventory {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111827;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            min-height: 50px;
        }

        .item {
            padding: 10px 20px;
            background: #1F2937;
            border: 1px solid #374151;
            border-radius: 8px;
            font-size: 14px;
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(31, 41, 55, 0.95);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #3B82F6;
            display: none;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="header">🕵️ Mission : Vol au Musée</div>

<div class="scene">
    <div class="image-container">
        <img src="Image1.jpg" alt="Scène du crime">

        <div class="zone" style="top: 28%; left: 15%; width: 40%; height: 25%;" onclick="find('vitrine')"></div>
        
        <div class="zone" style="top: 0%; left: 80%; width: 20%; height: 15%;" onclick="find('camera')"></div>
        
        <div class="zone" style="top: 60%; left: 45%; width: 40%; height: 20%;" onclick="find('empreintes')"></div>
    </div>
</div>

<div class="inventory" id="inventory"></div>
<div class="popup" id="popup"></div>

<script>
    let found = [];

    function find(item) {
        if (!found.includes(item)) {
            found.push(item);
            let label = "";
            if (item === "vitrine") label = "🪟 Vitrine cassée";
            if (item === "empreintes") label = "👣 Empreintes";
            if (item === "camera") label = "📷 Caméra coupée";

            // Ajout à l'inventaire
            let div = document.createElement("div");
            div.className = "item";
            div.textContent = label;
            document.getElementById("inventory").appendChild(div);

            showPopup(label + " trouvé !");
        }

        if (found.length === 3) {
            setTimeout(() => {
                showPopup("✨ Félicitations Détective ! Tous les indices sont réunis.");
            }, 1000);
        }
    }

    function showPopup(text) {
        let popup = document.getElementById("popup");
        popup.textContent = text;
        popup.style.display = "block";
        setTimeout(() => { popup.style.display = "none"; }, 2500);
    }
</script>

</body>
</html>
