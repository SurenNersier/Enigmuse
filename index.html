<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détective Game</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0B0F1A;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  background: #111827;
  text-align: center;
  font-weight: bold;
}

/* SCENE */
.scene {
  position: relative;
  height: 70vh;
  overflow: hidden;
}

.scene img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ZONES CLIQUABLES */
.zone {
  position: absolute;
  border-radius: 10px;
}

.zone:hover {
  background: rgba(255,255,255,0.1);
  cursor: pointer;
}

/* INVENTAIRE */
.inventory {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111827;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.item {
  padding: 10px;
  background: #1F2937;
  border-radius: 10px;
  font-size: 14px;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #1F2937;
  padding: 15px;
  border-radius: 10px;
  display: none;
}

</style>
</head>

<body>

<div class="header">
🕵️ Mission : Vol au Musée
</div>

<div class="scene">

<img src="Images/Image1.png">

<!-- zones -->
<div class="zone" style="top:30%; left:20%; width:20%; height:25%;" onclick="find('vitrine')"></div>
<div class="zone" style="top:60%; left:40%; width:20%; height:20%;" onclick="find('empreintes')"></div>
<div class="zone" style="top:10%; left:70%; width:20%; height:20%;" onclick="find('camera')"></div>

</div>

<div class="inventory" id="inventory">
</div>

<div class="popup" id="popup"></div>

<script>

let found = [];

function find(item) {

  if (!found.includes(item)) {
    found.push(item);

    let label = "";

    if (item === "vitrine") label = "🪟 Vitrine cassée";
    if (item === "empreintes") label = "👣 Empreintes";
    if (item === "camera") label = "📷 Caméra coupée";

    // ajout inventaire
    let div = document.createElement("div");
    div.className = "item";
    div.textContent = label;
    document.getElementById("inventory").appendChild(div);

    // popup
    showPopup(label + " trouvé !");
  }

  if (found.length === 3) {
    setTimeout(() => {
      showPopup("Tous les indices trouvés. Passe à l’analyse.");
    }, 500);
  }
}

function showPopup(text) {
  let popup = document.getElementById("popup");
  popup.textContent = text;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 2000);
}

</script>

</body>
</html>
