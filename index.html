<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🕵️‍♂️ Le Vol au Musée</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.hidden { display: none; }

button {
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
}

#game {
  max-width: 800px;
  margin: auto;
}

.scene {
  position: relative;
}

.scene img {
  width: 100%;
}

.clue {
  position: absolute;
  border: 2px solid transparent;
}

.clue:hover {
  border: 2px solid yellow;
}

#inventory {
  background: #222;
  padding: 10px;
  margin-top: 10px;
}

</style>
</head>

<body>

<div id="game">

<h1>🕵️‍♂️ Le Vol au Musée</h1>

<!-- INTRO -->
<div id="intro">
  <p>Un bijou précieux a été volé... Trouve le coupable.</p>
  <button onclick="startGame()">Commencer</button>
</div>

<!-- SCENE -->
<div id="scene" class="hidden">
  <p>🔍 Clique sur les indices :</p>

  <div class="scene">
    <img src="https://images.unsplash.com/photo-1544967882-7b5d0c1a0d6d">

    <!-- zones cliquables -->
    <div class="clue" style="top:30%; left:20%; width:15%; height:20%;" onclick="findClue('vitrine')"></div>
    <div class="clue" style="top:60%; left:40%; width:15%; height:20%;" onclick="findClue('empreintes')"></div>
    <div class="clue" style="top:10%; left:70%; width:15%; height:20%;" onclick="findClue('camera')"></div>
  </div>

  <div id="inventory">
    <h3>📦 Indices :</h3>
    <ul id="cluesList"></ul>
  </div>
</div>

<!-- INTERROGATOIRE -->
<div id="suspects" class="hidden">
  <p>🧠 Interroge les suspects :</p>

  <button onclick="talk('Lucas')">Lucas (gardien)</button>
  <button onclick="talk('Emma')">Emma (visiteuse)</button>
  <button onclick="talk('Noah')">Noah (technique)</button>

  <p id="dialogue"></p>

  <button onclick="goToFinal()">Accuser quelqu’un</button>
</div>

<!-- CHOIX FINAL -->
<div id="final" class="hidden">
  <p>Qui est le coupable ?</p>

  <button onclick="answer('Lucas')">Lucas</button>
  <button onclick="answer('Emma')">Emma</button>
  <button onclick="answer('Noah')">Noah</button>
</div>

<!-- RESULTAT -->
<div id="result"></div>

</div>

<script>

let clues = [];

function startGame() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('scene').classList.remove('hidden');
}

function findClue(clue) {
  if (!clues.includes(clue)) {
    clues.push(clue);

    let text = "";

    if (clue === "vitrine") text = "Vitrine cassée de l'intérieur";
    if (clue === "empreintes") text = "Empreintes techniques";
    if (clue === "camera") text = "Caméra coupée à 22h";

    let li = document.createElement("li");
    li.textContent = text;
    document.getElementById("cluesList").appendChild(li);
  }

  if (clues.length === 3) {
    setTimeout(() => {
      document.getElementById('scene').classList.add('hidden');
      document.getElementById('suspects').classList.remove('hidden');
    }, 500);
  }
}

function talk(name) {
  let dialogue = "";

  if (name === "Lucas") {
    dialogue = "Je faisais ma ronde toute la nuit.";
  }
  if (name === "Emma") {
    dialogue = "Je suis partie à 21h, je n'ai rien vu.";
  }
  if (name === "Noah") {
    dialogue = "Je réparais les caméras... enfin presque.";
  }

  document.getElementById("dialogue").textContent = name + " : " + dialogue;
}

function goToFinal() {
  document.getElementById('suspects').classList.add('hidden');
  document.getElementById('final').classList.remove('hidden');
}

function answer(name) {
  let result = document.getElementById('result');

  if (name === "Noah") {
    result.innerHTML = "✅ Bravo ! Noah est coupable !<br><br>Indice clé : accès aux caméras + vitrine cassée de l’intérieur.";
  } else {
    result.innerHTML = "❌ Mauvaise accusation... Réessaie !";
  }
}

</script>

</body>
</html>
